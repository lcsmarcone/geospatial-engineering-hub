<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lucas Marcone - Geospatial Software Engineer</title>
    <script>
      // SPA redirect for GitHub Pages — encodes the path into a query param
      // and redirects to index.html so React Router can handle the route.
      // pathSegmentsToKeep = 1 keeps the repo name segment (/geospatial-engineering-hub)
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
